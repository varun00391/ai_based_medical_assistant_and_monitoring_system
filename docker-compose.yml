services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medassist
      POSTGRES_PASSWORD: medassist
      POSTGRES_DB: medassist
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://medassist:medassist@db:5432/medassist
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_LOG_LEVEL: ${UVICORN_LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      - db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  backend_data:
