name: Azure Infra

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Azure region (optional)"
        required: false
        default: "eastus"
      resource_group:
        description: "Resource group (optional)"
        required: false
        default: "rg-ai-medical-assist-prod"
      acr_name:
        description: "ACR name (optional)"
        required: false
        default: "aimedassistacr"
      containerapps_env:
        description: "Container Apps environment name (optional)"
        required: false
        default: "cae-ai-medical-assist-prod"
      log_analytics:
        description: "Log Analytics workspace name (optional)"
        required: false
        default: "law-ai-medical-assist-prod"

permissions:
  id-token: write
  contents: read

jobs:
  infra:
    name: Provision Azure infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run infra script
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_REGION: ${{ github.event.inputs.region }}
          AZURE_RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
          ACR_NAME: ${{ github.event.inputs.acr_name }}
          AZURE_CONTAINERAPPS_ENV: ${{ github.event.inputs.containerapps_env }}
          AZURE_LOG_ANALYTICS: ${{ github.event.inputs.log_analytics }}
        run: |
          chmod +x scripts/azure_infra.sh
          ./scripts/azure_infra.sh
